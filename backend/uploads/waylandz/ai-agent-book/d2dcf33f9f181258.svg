<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
      .decision { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#10b981"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="680" height="350" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">Memory 生命周期</text>
  <text x="340" y="40" class="label">MEMORY LIFECYCLE</text>

  <!-- ── Flow 1: Append → Overflow ── -->

  <!-- memory_append box -->
  <rect x="20" y="62" width="120" height="36" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="80" y="78" class="box-text">memory_append</text>
  <text x="80" y="92" class="label">WRITE</text>

  <line x1="140" y1="80" x2="175" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="220,60 265,80 220,100 175,80" fill="#f9fafb" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="220" y="84" class="decision">≥150行?</text>

  <!-- No path → MEMORY.md -->
  <line x1="220" y1="60" x2="220" y2="52" stroke="#10b981" stroke-width="1.5"/>
  <line x1="220" y1="52" x2="380" y2="52" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="300" y="46" class="label" style="fill:#10b981">NO</text>
  <rect x="382" y="38" width="130" height="32" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="447" y="55" class="box-text">MEMORY.md</text>
  <text x="447" y="66" class="label">MAIN FILE</text>

  <!-- Yes path → overflow -->
  <line x1="265" y1="80" x2="382" y2="80" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="300" y="76" class="label" style="fill:#ef4444">YES</text>
  <rect x="382" y="76" width="180" height="32" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="472" y="96" class="box-text">auto-YYYY-MM-DD.md</text>

  <!-- pointer note -->
  <line x1="512" y1="76" x2="512" y2="70" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="590" y="118" class="annot-s" style="text-anchor:middle">+ pointer in MEMORY.md</text>

  <!-- ── Separator line ── -->
  <line x1="20" y1="130" x2="660" y2="130" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Flow 2: PersistLearnings ── -->
  <rect x="20" y="148" width="130" height="36" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
  <text x="85" y="164" class="annot" style="text-anchor:middle">上下文 85% 满</text>
  <text x="85" y="178" class="label">CONTEXT 85% FULL</text>

  <line x1="150" y1="166" x2="186" y2="166" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="188" y="148" width="140" height="36" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="258" y="164" class="box-text">PersistLearnings</text>
  <text x="258" y="178" class="label">EXTRACT</text>

  <line x1="328" y1="166" x2="364" y2="166" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="366" y="148" width="120" height="36" fill="#f9fafb" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="426" y="164" class="annot" style="text-anchor:middle">提取持久事实</text>
  <text x="426" y="178" class="label">EXTRACT FACTS</text>

  <line x1="486" y1="166" x2="522" y2="166" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="524" y="148" width="130" height="36" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="589" y="164" class="box-text">MEMORY.md</text>
  <text x="589" y="178" class="label">APPEND</text>

  <!-- ── Separator line ── -->
  <line x1="20" y1="206" x2="660" y2="206" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Flow 3: ConsolidateMemory ── -->
  <rect x="20" y="224" width="130" height="48" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
  <text x="85" y="241" class="annot" style="text-anchor:middle">≥12 auto 文件</text>
  <text x="85" y="255" class="annot" style="text-anchor:middle">+ 7 天</text>
  <text x="85" y="268" class="label">TRIGGER</text>

  <line x1="150" y1="248" x2="186" y2="248" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="188" y="228" width="160" height="40" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="268" y="246" class="box-text">ConsolidateMemory</text>
  <text x="268" y="262" class="label">MERGE</text>

  <line x1="348" y1="248" x2="384" y2="248" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="386" y="228" width="120" height="40" fill="#f9fafb" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="446" y="246" class="annot" style="text-anchor:middle">LLM 合并去重</text>
  <text x="446" y="262" class="label">LLM DEDUP</text>

  <line x1="506" y1="248" x2="542" y2="248" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="544" y="228" width="116" height="40" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="602" y="246" class="box-text">MEMORY.md</text>
  <text x="602" y="262" class="label">CLEAN</text>

  <!-- Bottom summary -->
  <text x="340" y="310" class="annot-s" style="text-anchor:middle">Append → Overflow → Persist → Consolidate — fully autonomous memory management</text>
  <text x="340" y="324" class="annot-s" style="text-anchor:middle">追加 → 溢出 → 持久化 → 合并 — 全自动记忆管理</text>
</svg>