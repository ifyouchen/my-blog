<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
  <defs>
    <style>
      .title { font: 700 14px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .label { font: 600 11px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .sublabel { font: 500 9px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; }
      .feature { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #64748b; text-anchor: middle; }
      .feature-blue { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #60a5fa; text-anchor: middle; }
      .vs { font: 700 16px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #cbd5e1; text-anchor: middle; }
    </style>
    <marker id="arr-gray" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#fff"/>

  <!-- VS 分隔 -->
  <text x="360" y="210" class="vs">VS</text>
  <line x1="360" y1="40" x2="360" y2="180" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="360" y1="235" x2="360" y2="400" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== 左侧：传统 AI 搜索 ===== -->
  <text x="170" y="35" class="title">传统 AI 搜索</text>

  <!-- 简单线性流程 -->
  <rect x="120" y="60" width="100" height="32" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="170" y="81" class="label">Query</text>

  <line x1="170" y1="92" x2="170" y2="108" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <rect x="120" y="112" width="100" height="32" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="170" y="133" class="label">Retrieve</text>

  <line x1="170" y1="144" x2="170" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <rect x="120" y="164" width="100" height="32" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="170" y="185" class="label">Generate</text>

  <!-- 左侧特点 -->
  <rect x="95" y="250" width="150" height="100" rx="2" fill="#e5e7eb" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="275" class="feature">一次性检索</text>
  <text x="170" y="295" class="feature">无规划推理</text>
  <text x="170" y="315" class="feature">不验证来源</text>
  <text x="170" y="335" class="feature">片段拼接输出</text>

  <!-- ===== 右侧：Deep Research ===== -->
  <text x="550" y="35" class="title">Deep Research</text>

  <!-- Plan -->
  <rect x="500" y="60" width="100" height="32" rx="2" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="550" y="81" class="label">Plan</text>

  <line x1="550" y1="92" x2="550" y2="108" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Search -->
  <rect x="500" y="112" width="100" height="32" rx="2" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="550" y="133" class="label">Search</text>

  <line x1="550" y1="144" x2="550" y2="160" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Evaluate -->
  <rect x="500" y="164" width="100" height="32" rx="2" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="550" y="185" class="label">Evaluate</text>

  <!-- 迭代循环 -->
  <path d="M 500 180 Q 455 180 455 128 Q 455 76 500 76" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>
  <text x="443" y="132" class="sublabel" text-anchor="end">迭代</text>

  <line x1="550" y1="196" x2="550" y2="212" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Verify -->
  <rect x="500" y="216" width="100" height="32" rx="2" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="550" y="237" class="label">Verify</text>

  <line x1="550" y1="248" x2="550" y2="264" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Synthesize -->
  <rect x="500" y="268" width="100" height="32" rx="2" fill="#60a5fa" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="550" y="289" class="label" fill="#fff">Synthesize</text>

  <!-- 右侧特点 -->
  <rect x="475" y="320" width="150" height="85" rx="2" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="550" y="342" class="feature-blue">多轮迭代</text>
  <text x="550" y="360" class="feature-blue">规划 + 判断</text>
  <text x="550" y="378" class="feature-blue">交叉验证来源</text>
  <text x="550" y="396" class="feature-blue">结构化报告</text>
</svg>
