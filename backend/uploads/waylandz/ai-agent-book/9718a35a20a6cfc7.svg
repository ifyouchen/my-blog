<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
      .config   { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#555; }
      .tag      { font: 500 8px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.3px; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">SwitchAgent 运行时切换</text>
  <text x="340" y="40" class="label">SWITCHAGENT RUNTIME SWAP</text>

  <!-- Center: Agent Harness -->
  <rect x="200" y="140" width="160" height="90" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="280" y="175" class="box-text">Agent Harness</text>
  <text x="280" y="195" class="label">SINGLE LOOP</text>
  <text x="280" y="215" class="annot-s" style="text-anchor:middle">Active Config ↓</text>

  <!-- Left: SwitchAgent() call -->
  <rect x="20" y="160" width="140" height="44" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="90" y="180" class="box-text">SwitchAgent()</text>
  <text x="90" y="196" class="label">TOOL CALL</text>
  <line x1="160" y1="182" x2="198" y2="182" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Right side: 3 agent config boxes -->

  <!-- Agent 1: code-reviewer -->
  <rect x="430" y="60" width="230" height="76" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="545" y="80" class="box-text">code-reviewer</text>
  <text x="545" y="96" class="config">model: haiku</text>
  <text x="545" y="108" class="config">tools: [grep, file_read]</text>
  <text x="454" y="130" class="tag">PROMPT</text>
  <text x="498" y="130" class="tag">MEMORY</text>
  <text x="545" y="130" class="tag">TOOLS</text>
  <text x="586" y="130" class="tag">MCP</text>

  <!-- Agent 2: research (active) -->
  <rect x="430" y="162" width="230" height="76" fill="#d1fae5" stroke="#3b82f6" stroke-width="2" rx="2" stroke-dasharray="6,3"/>
  <text x="545" y="182" class="box-text">research</text>
  <text x="545" y="198" class="config">model: opus</text>
  <text x="545" y="210" class="config">tools: [web_search, memory]</text>
  <text x="454" y="232" class="tag">PROMPT</text>
  <text x="498" y="232" class="tag">MEMORY</text>
  <text x="545" y="232" class="tag">TOOLS</text>
  <text x="586" y="232" class="tag">MCP</text>

  <!-- Agent 3: daily-ops -->
  <rect x="430" y="264" width="230" height="76" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="545" y="284" class="box-text">daily-ops</text>
  <text x="545" y="300" class="config">model: sonnet</text>
  <text x="545" y="312" class="config">auto-approve: true</text>
  <text x="454" y="334" class="tag">PROMPT</text>
  <text x="498" y="334" class="tag">MEMORY</text>
  <text x="545" y="334" class="tag">TOOLS</text>
  <text x="586" y="334" class="tag">MCP</text>

  <!-- Dotted lines from harness to agents -->
  <line x1="360" y1="160" x2="428" y2="98" stroke="#ccc" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="360" y1="185" x2="428" y2="200" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="210" x2="428" y2="302" stroke="#ccc" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Active indicator -->
  <text x="398" y="192" class="annot-s" style="fill:#3b82f6">ACTIVE</text>

  <!-- Bottom annotation -->
  <text x="340" y="375" class="annot-s" style="text-anchor:middle">Only one agent config is active at a time — harness loop continues uninterrupted</text>
  <text x="340" y="388" class="annot-s" style="text-anchor:middle">每次仅一个配置激活 — 循环不中断</text>
</svg>