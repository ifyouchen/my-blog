<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .title { font: 700 16px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 12px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .sublabel { font: 500 9px 'SF Mono', 'PingFang SC', sans-serif; fill: #64748b; text-anchor: middle; }
      .cost { font: 700 11px 'SF Mono', sans-serif; text-anchor: middle; }
      .path-label { font: 600 10px 'SF Mono', 'PingFang SC', sans-serif; text-anchor: middle; }
      .summary { font: 500 10px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="28" class="title">Prompt Cache 工作流程</text>
  <text x="340" y="44" class="label">PROMPT CACHE WORKFLOW</text>

  <!-- Step 1: New Request -->
  <rect x="270" y="58" width="140" height="32" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="16"/>
  <text x="340" y="79" class="box-text">新请求到达</text>

  <!-- Arrow down -->
  <line x1="340" y1="90" x2="340" y2="112" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Decision Diamond (hand-drawn polygon) -->
  <polygon points="340,115 405,148 340,181 275,148" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="340" y="152" class="box-text">前缀匹配？</text>

  <!-- === Left: Cache Hit (green) === -->
  <line x1="275" y1="148" x2="200" y2="148" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="237" y="140" class="path-label" style="fill:#22c55e;">命中 ✓</text>

  <!-- Arrow down -->
  <line x1="175" y1="148" x2="175" y2="188" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Box: Reuse KV Cache -->
  <rect x="95" y="192" width="160" height="36" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5" rx="3"/>
  <text x="175" y="214" class="box-text">复用 KV Cache</text>

  <!-- Cost tags -->
  <rect x="98" y="240" width="70" height="22" fill="#d1fae5" rx="3" stroke="#22c55e" stroke-width="1"/>
  <text x="133" y="255" class="cost" style="fill:#16a34a;">0.1x 费用</text>
  <rect x="178" y="240" width="74" height="22" fill="#d1fae5" rx="3" stroke="#22c55e" stroke-width="1"/>
  <text x="215" y="255" class="cost" style="fill:#16a34a;">延迟 ↓79%</text>

  <!-- Arrow to merge -->
  <line x1="175" y1="268" x2="175" y2="330" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="175" y1="330" x2="280" y2="330" stroke="#22c55e" stroke-width="1.5"/>

  <!-- === Right: Cache Miss (orange) === -->
  <line x1="405" y1="148" x2="480" y2="148" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="443" y="140" class="path-label" style="fill:#f59e0b;">未命中 ✗</text>

  <!-- Arrow down -->
  <line x1="505" y1="148" x2="505" y2="188" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Box: Full Forward Pass -->
  <rect x="425" y="192" width="160" height="36" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="505" y="214" class="box-text">完整前向传播</text>

  <!-- Cost tag -->
  <rect x="467" y="240" width="76" height="22" fill="#fef3c7" rx="3" stroke="#f59e0b" stroke-width="1"/>
  <text x="505" y="255" class="cost" style="fill:#d97706;">1x 费用</text>

  <!-- Arrow to write cache -->
  <line x1="505" y1="268" x2="505" y2="288" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Box: Write Cache -->
  <rect x="430" y="292" width="150" height="28" fill="#fff" stroke="#f59e0b" stroke-width="1.5" rx="3" stroke-dasharray="6,3"/>
  <text x="505" y="310" class="box-text" style="font-size:11px;">写入 Cache (1.25x)</text>

  <!-- Arrow to merge -->
  <line x1="505" y1="320" x2="505" y2="330" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="505" y1="330" x2="400" y2="330" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Step 4: Generate Response (merge) -->
  <rect x="285" y="316" width="110" height="28" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="14"/>
  <text x="340" y="334" class="box-text">生成响应</text>

  <!-- Summary box -->
  <rect x="130" y="370" width="420" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="3"/>
  <text x="340" y="390" class="summary">优化原则：前缀稳定 + Append-Only + 工具定义不变</text>
</svg>
