<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
    </style>
  </defs>
  <rect width="680" height="520" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">同心环架构</text>
  <text x="340" y="40" class="label">CONCENTRIC RINGS ARCHITECTURE</text>

  <!-- Ring 4 (outermost): MCP + Cloud -->
  <circle cx="260" cy="290" r="210" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Ring 3: Daemon + Schedule + Watcher -->
  <circle cx="260" cy="290" r="168" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Ring 2: Skills + Memory + Sessions -->
  <circle cx="260" cy="290" r="126" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Ring 1: Named Agents -->
  <circle cx="260" cy="290" r="84" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Center: Agent Harness -->
  <circle cx="260" cy="290" r="44" fill="#67e8f9" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="260" y="285" class="box-text">Agent</text>
  <text x="260" y="300" class="box-text">Harness</text>
  <text x="260" y="316" class="annot-s" style="text-anchor:middle;fill:#555">代理循环</text>

  <!-- Leader lines + labels on the right side -->

  <!-- Center label -->
  <line x1="304" y1="290" x2="500" y2="112" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="107" x2="500" y2="117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="505" y="108" class="annot">Agent Harness</text>
  <text x="505" y="120" class="annot-s">代理循环</text>

  <!-- Ring 1 label -->
  <line x1="340" y1="260" x2="500" y2="152" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="147" x2="500" y2="157" stroke="#1a1a1a" stroke-width="1"/>
  <text x="505" y="148" class="annot">Named Agents</text>
  <text x="505" y="160" class="annot-s">命名代理</text>

  <!-- Ring 2 label -->
  <line x1="378" y1="240" x2="500" y2="196" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="191" x2="500" y2="201" stroke="#1a1a1a" stroke-width="1"/>
  <text x="505" y="192" class="annot">Skills + Memory + Sessions</text>
  <text x="505" y="204" class="annot-s">技能 + 记忆 + 会话</text>

  <!-- Ring 3 label -->
  <line x1="418" y1="224" x2="500" y2="242" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="237" x2="500" y2="247" stroke="#1a1a1a" stroke-width="1"/>
  <text x="505" y="238" class="annot">Daemon + Schedule + Watcher</text>
  <text x="505" y="250" class="annot-s">守护进程 + 定时 + 监听</text>

  <!-- Ring 4 label -->
  <line x1="456" y1="210" x2="500" y2="282" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="277" x2="500" y2="287" stroke="#1a1a1a" stroke-width="1"/>
  <text x="505" y="278" class="annot">MCP + Cloud</text>
  <text x="505" y="290" class="annot-s">MCP + 云端协作</text>
</svg>