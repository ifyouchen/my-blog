<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
      .inner    { font: 500 11px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-bl" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0,0 3.5,10 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">Daemon 多源路由</text>
  <text x="340" y="40" class="label">DAEMON MULTI-SOURCE ROUTING</text>

  <!-- ── Left: Sources ── -->
  <rect x="20" y="72" width="110" height="40" fill="#e9d5ff" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="90" class="box-text">Slack</text>
  <text x="75" y="106" class="label">SOURCE</text>

  <rect x="20" y="132" width="110" height="40" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="150" class="box-text">LINE</text>
  <text x="75" y="166" class="label">SOURCE</text>

  <rect x="20" y="192" width="110" height="40" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="206" class="box-text">Kocoro</text>
  <text x="75" y="220" class="box-text">Desktop</text>

  <rect x="20" y="252" width="110" height="40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="270" class="box-text">Webhook</text>
  <text x="75" y="286" class="label">SOURCE</text>

  <!-- Arrows from sources to daemon -->
  <line x1="130" y1="92" x2="178" y2="140" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="130" y1="152" x2="178" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="130" y1="212" x2="178" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="130" y1="272" x2="178" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Center: Daemon box ── -->
  <rect x="180" y="66" width="300" height="240" fill="#f8fafc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="330" y="88" class="box-text">Daemon</text>
  <text x="330" y="104" class="label">DAEMON PROCESS</text>

  <!-- SessionKey mapper -->
  <rect x="200" y="116" width="260" height="44" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="330" y="136" class="inner">SessionKey Mapper</text>
  <text x="330" y="152" class="annot-s" style="text-anchor:middle">(source, channel, thread_id)</text>

  <!-- ApprovalBroker -->
  <rect x="200" y="176" width="260" height="36" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="330" y="198" class="inner">ApprovalBroker</text>

  <!-- EventBus -->
  <rect x="200" y="228" width="260" height="36" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="330" y="250" class="inner">EventBus (SSE)</text>

  <!-- Bidirectional approval arrow back to sources -->
  <line x1="200" y1="194" x2="140" y2="194" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-bl)"/>
  <line x1="140" y1="194" x2="200" y2="194" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-b)"/>
  <text x="170" y="188" class="annot-s" style="text-anchor:middle;fill:#3b82f6">APPROVAL</text>

  <!-- ── Right: Agent Sessions ── -->
  <rect x="540" y="86" width="120" height="44" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="600" y="104" class="inner">Session #1</text>
  <text x="600" y="120" class="annot-s" style="text-anchor:middle">slack:ch1:t42</text>

  <rect x="540" y="148" width="120" height="44" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="600" y="166" class="inner">Session #2</text>
  <text x="600" y="182" class="annot-s" style="text-anchor:middle">line:grp3:msg8</text>

  <rect x="540" y="210" width="120" height="44" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="600" y="228" class="inner">Session #3</text>
  <text x="600" y="244" class="annot-s" style="text-anchor:middle">claw:dm:t12</text>

  <rect x="540" y="272" width="120" height="44" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="600" y="290" class="inner">Session #N</text>
  <text x="600" y="306" class="annot-s" style="text-anchor:middle">webhook:...</text>

  <!-- Arrows from daemon to sessions -->
  <line x1="480" y1="138" x2="538" y2="108" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="155" x2="538" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="200" x2="538" y2="232" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="230" x2="538" y2="294" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Labels -->
  <text x="510" y="82" class="label">AGENT SESSIONS</text>

  <!-- Bottom annotation -->
  <text x="340" y="340" class="annot" style="text-anchor:middle">Each unique (source, channel, thread_id) → isolated agent session</text>
  <text x="340" y="356" class="annot-s" style="text-anchor:middle">每个唯一组合 → 隔离的 Agent 会话</text>

  <!-- SSE note -->
  <text x="340" y="380" class="annot-s" style="text-anchor:middle">SSE streams real-time events back to each source client</text>
  <text x="340" y="394" class="annot-s" style="text-anchor:middle">SSE 实时推送事件回各源端</text>
</svg>