<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
      .mode     { font: 600 11px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <marker id="arr-in" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#10b981"/>
    </marker>
    <marker id="arr-out" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="680" height="350" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">MCP 双向集成</text>
  <text x="340" y="40" class="label">MCP BIDIRECTIONAL INTEGRATION</text>

  <!-- Center: Kocoro Harness -->
  <rect x="248" y="100" width="184" height="80" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="340" y="132" class="box-text">Kocoro</text>
  <text x="340" y="150" class="box-text">Harness</text>
  <text x="340" y="172" class="label">AGENT LOOP</text>

  <!-- ── Left: Consumer Mode ── -->
  <text x="110" y="74" class="mode">消费者模式</text>
  <text x="110" y="88" class="label">CONSUMER MODE</text>

  <!-- MCP Server boxes -->
  <rect x="20" y="100" width="160" height="36" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="100" y="117" class="box-text">Playwright MCP</text>
  <text x="100" y="132" class="label">BROWSER TOOL</text>

  <rect x="20" y="152" width="160" height="36" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="100" y="169" class="box-text">Custom MCP</text>
  <text x="100" y="184" class="label">SERVER</text>

  <rect x="20" y="204" width="160" height="36" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="100" y="221" class="box-text">Gateway Tools</text>
  <text x="100" y="236" class="label">AGGREGATED</text>

  <!-- Arrows INTO harness (green) -->
  <line x1="180" y1="118" x2="246" y2="130" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-in)"/>
  <line x1="180" y1="170" x2="246" y2="145" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-in)"/>
  <line x1="180" y1="222" x2="246" y2="158" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-in)"/>

  <!-- ── Right: Producer Mode ── -->
  <text x="570" y="74" class="mode">生产者模式</text>
  <text x="570" y="88" class="label">PRODUCER MODE</text>

  <rect x="500" y="106" width="160" height="36" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="580" y="123" class="box-text">IDE / Editor</text>
  <text x="580" y="138" class="label">CLIENT</text>

  <rect x="500" y="160" width="160" height="36" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="580" y="177" class="box-text">Other Agent</text>
  <text x="580" y="192" class="label">FRAMEWORK</text>

  <!-- Arrows OUT from harness (blue) -->
  <line x1="432" y1="128" x2="498" y2="124" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-out)"/>
  <line x1="432" y1="148" x2="498" y2="178" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-out)"/>

  <!-- mcp-serve label -->
  <rect x="500" y="210" width="160" height="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="2" stroke-dasharray="4,2"/>
  <text x="580" y="228" class="annot" style="text-anchor:middle">shan --mcp-serve</text>

  <!-- Bottom annotations -->
  <text x="110" y="268" class="annot-s" style="text-anchor:middle">Harness calls external tools</text>
  <text x="110" y="282" class="annot-s" style="text-anchor:middle">via MCP protocol</text>

  <text x="570" y="268" class="annot-s" style="text-anchor:middle">Harness exposes its tools</text>
  <text x="570" y="282" class="annot-s" style="text-anchor:middle">as an MCP server</text>

  <!-- Divider arrows explanation -->
  <text x="340" y="310" class="annot" style="text-anchor:middle">Consumer: use tools from MCP servers ← → Producer: serve tools to MCP clients</text>
  <text x="340" y="326" class="annot-s" style="text-anchor:middle">消费者：调用外部工具 ← → 生产者：对外暴露工具</text>
</svg>