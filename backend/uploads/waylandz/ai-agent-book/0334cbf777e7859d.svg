<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .phase    { font: 600 10px 'SF Mono','Menlo','Monaco',monospace; fill:#fff; text-anchor:middle; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#10b981"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="680" height="480" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="label">Agent Harness 架构 / AGENT HARNESS LOOP</text>

  <!-- ── User Input ─────────────────────────────────── -->
  <rect x="265" y="38" width="150" height="40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="340" y="55" class="box-text">用户输入</text>
  <text x="340" y="70" class="label">USER MESSAGE</text>

  <line x1="340" y1="78" x2="340" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── LLM Call ─────────────────────────────────── -->
  <rect x="220" y="102" width="240" height="44" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="340" y="121" class="box-text">LLM 调用</text>
  <text x="340" y="138" class="label">GATEWAY → STREAMING RESPONSE</text>

  <!-- ── Fork: no tool vs tool calls ─── -->
  <line x1="340" y1="146" x2="340" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond decision -->
  <polygon points="340,168 390,188 340,208 290,188" fill="#f9fafb" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="340" y="185" class="sub-text">工具调用？</text>
  <text x="340" y="200" class="label">TOOL CALLS?</text>

  <!-- No → final response -->
  <line x1="290" y1="188" x2="165" y2="188" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="228" y="180" class="label" style="fill:#10b981">NO</text>
  <rect x="60" y="168" width="104" height="40" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="112" y="185" class="box-text">返回结果</text>
  <text x="112" y="198" class="label">FINAL REPLY</text>

  <!-- Yes → Phase 1 -->
  <line x1="340" y1="208" x2="340" y2="228" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="352" y="222" class="label" style="fill:#ef4444">YES</text>

  <!-- ── Phase 1: Serial Admission ─── -->
  <rect x="60" y="230" width="560" height="66" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="60" y="230" width="76" height="66" fill="#ec4899" stroke="none" rx="2"/>
  <text x="98" y="258" class="phase">阶段 1</text>
  <text x="98" y="274" class="phase">SERIAL</text>
  <text x="98" y="290" class="phase">ADMIT</text>

  <text x="380" y="253" class="sub-text">去重 → 跨迭代缓存 → 权限引擎（5层）→ 用户审批 → Pre-hook</text>
  <text x="310" y="272" class="sub-text">DEDUP → CACHE HIT → PERMISSION (5-layer) → USER APPROVAL</text>
  <text x="220" y="288" class="annot">      exit 2 → 拒绝执行，拒绝原因返回 LLM</text>

  <line x1="340" y1="296" x2="340" y2="315" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 2: Parallel Execution ─── -->
  <rect x="60" y="317" width="560" height="52" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="60" y="317" width="76" height="52" fill="#3b82f6" stroke="none" rx="2"/>
  <text x="98" y="342" class="phase">阶段 2</text>
  <text x="98" y="358" class="phase">PARALLEL</text>
  <text x="380" y="340" class="sub-text">sync.WaitGroup — 并发执行所有已通过准入的工具调用</text>
  <text x="370" y="358" class="sub-text">bash / file / computer / accessibility / browser / screenshot ...</text>

  <line x1="340" y1="369" x2="340" y2="388" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 3: Serial Post ─── -->
  <rect x="60" y="390" width="560" height="52" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="60" y="390" width="76" height="52" fill="#10b981" stroke="none" rx="2"/>
  <text x="98" y="415" class="phase">阶段 3</text>
  <text x="98" y="431" class="phase">SERIAL</text>
  <text x="98" y="447" class="phase">POST</text>
  <text x="370" y="413" class="sub-text">Post-hook → 审计日志 → 循环检测（9探测器）</text>
  <text x="370" y="431" class="sub-text">AUDIT LOG → LOOP DETECT (9 detectors) → NUDGE / FORCE-STOP</text>
  <text x="295" y="448" class="annot">    追加工具结果到对话上下文 → 继续下一轮迭代</text>

  <!-- Loop back arrow -->
  <line x1="620" y1="416" x2="648" y2="416" stroke="#666" stroke-width="1.5"/>
  <line x1="648" y1="416" x2="648" y2="124" stroke="#666" stroke-width="1.5"/>
  <line x1="648" y1="124" x2="462" y2="124" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="270" class="annot" style="writing-mode:vertical-rl; transform:rotate(0)">下一迭代</text>

  <!-- Context compaction note -->
  <rect x="465" y="102" width="175" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="2" stroke-dasharray="4,2"/>
  <text x="552" y="118" class="sub-text">上下文压缩触发</text>
  <text x="552" y="132" class="label">TOKEN &gt; 85% → COMPACT</text>
  <line x1="460" y1="122" x2="463" y2="122" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>

</svg>
