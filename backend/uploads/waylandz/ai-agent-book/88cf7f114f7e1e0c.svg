<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:middle; }
      .annot    { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; }
      .annot-s  { font: 400 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
      .event    { font: 500 9px 'SF Mono','Menlo','Monaco',monospace; fill:#3b82f6; }
      .wf       { font: 500 9px 'SF Mono','Menlo','Monaco',monospace; fill:#666; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <marker id="arr-d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="680" height="350" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="box-text">Cloud Delegation 流程</text>
  <text x="340" y="40" class="label">CLOUD DELEGATION FLOW</text>

  <!-- Left: Local Agent -->
  <rect x="40" y="80" width="150" height="70" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="115" y="108" class="box-text">Local Agent</text>
  <text x="115" y="126" class="label">LOCAL HARNESS</text>
  <text x="115" y="142" class="annot-s" style="text-anchor:middle">本地代理</text>

  <!-- Right: Shannon Cloud -->
  <rect x="460" y="80" width="180" height="70" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="550" y="108" class="box-text">Shannon Cloud</text>
  <text x="550" y="126" class="label">CLOUD ORCHESTRATOR</text>
  <text x="550" y="142" class="annot-s" style="text-anchor:middle">云端编排</text>

  <!-- Forward arrow: cloud_delegate -->
  <line x1="190" y1="100" x2="458" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="324" y="93" class="box-text">cloud_delegate</text>

  <!-- Workflow type labels -->
  <rect x="240" y="62" width="60" height="18" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="270" y="74" class="wf" style="text-anchor:middle">research</text>
  <rect x="308" y="62" width="50" height="18" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="333" y="74" class="wf" style="text-anchor:middle">swarm</text>
  <rect x="366" y="62" width="42" height="18" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="387" y="74" class="wf" style="text-anchor:middle">auto</text>

  <!-- Return arrow: Streaming Progress (dashed) -->
  <line x1="458" y1="135" x2="192" y2="135" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
  <text x="324" y="130" class="annot" style="text-anchor:middle;fill:#3b82f6">Streaming Progress</text>

  <!-- Event labels below the dashed arrow -->
  <text x="240" y="162" class="event">OnCloudPlan</text>
  <text x="335" y="162" class="event">OnCloudProgress</text>
  <text x="430" y="162" class="event">OnCloudAgent</text>

  <!-- ── Bottom: Result Bypass ── -->
  <rect x="260" y="210" width="100" height="36" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="310" y="226" class="box-text">User</text>
  <text x="310" y="240" class="label">END USER</text>

  <!-- Arrow from Cloud direct to User (bypass) -->
  <line x1="550" y1="150" x2="550" y2="228" stroke="#10b981" stroke-width="1.5"/>
  <line x1="550" y1="228" x2="362" y2="228" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="480" y="218" class="annot" style="text-anchor:middle;fill:#10b981">Result Bypass</text>
  <text x="480" y="232" class="annot-s" style="text-anchor:middle">Skips LLM summarization</text>

  <!-- Arrow from Local Agent to User (normal) -->
  <line x1="115" y1="150" x2="115" y2="228" stroke="#666" stroke-width="1.2"/>
  <line x1="115" y1="228" x2="258" y2="228" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="175" y="218" class="annot-s" style="text-anchor:middle">Normal reply</text>

  <!-- Once-per-turn lock annotation -->
  <rect x="220" y="280" width="240" height="36" fill="#f9fafb" stroke="#f59e0b" stroke-width="1" rx="2" stroke-dasharray="4,2"/>
  <text x="340" y="296" class="annot" style="text-anchor:middle">Once-per-turn lock</text>
  <text x="340" y="310" class="annot-s" style="text-anchor:middle">每轮仅一次 cloud_delegate 调用</text>
</svg>